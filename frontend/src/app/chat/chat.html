<div class="chat-container">
  <div class="chat-header">
    <h2>💬 Чат заводчиков</h2>
    <div class="connection-status" [class.connected]="connected">
      {{ connected ? '🟢 Подключен' : '🔴 Отключен' }}
    </div>
  </div>

  <div *ngIf="!isLoggedIn" class="not-authorized">
    <p>⛔ Для доступа к чату необходимо <a routerLink="/login">войти</a></p>
  </div>

  <div *ngIf="isLoggedIn">
    <div class="messages-container">
      <div *ngFor="let msg of messages" class="message">
        <div class="message-header">
          <span class="username">{{ msg.username }}</span>
          <span class="timestamp">{{ msg.timestamp }}</span>
        </div>
        <div class="message-text">{{ msg.message }}</div>
      </div>
    </div>

    <div class="message-input">
      <input
        type="text"
        [(ngModel)]="newMessage"
        (keyup.enter)="sendMessage()"
        placeholder="Введите сообщение..."
        [disabled]="!connected"
      />
      <button (click)="sendMessage()" [disabled]="!connected || !newMessage.trim()">
        Отправить
      </button>
    </div>
  </div>
</div>
